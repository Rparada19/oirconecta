# Render Blueprint para OírConecta.
# - oirconecta-api: web service Node (backend Express), ya existente.
# - oirconecta-web: static site (frontend Vite), nuevo. Sirve oirconecta.com.
# Para crear/actualizar servicios desde este archivo: Render Dashboard → New +
# → Blueprint → conecta este repo. Las env vars sensibles (DATABASE_URL,
# JWT_SECRET, RESEND_API_KEY, SMTP_*) se siguen administrando en el dashboard.

services:
  - type: web
    name: oirconecta-api
    runtime: node
    rootDir: backend
    plan: free
    region: oregon
    branch: main
    buildCommand: npm ci && npx prisma generate
    startCommand: npm start
    healthCheckPath: /api/public/retail-config
    envVars:
      - key: NODE_ENV
        value: production

  - type: web
    name: oirconecta-web
    runtime: static
    rootDir: oirconecta
    plan: free
    branch: main
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_URL
        value: https://oirconecta-api.onrender.com
    routes:
      # Sitemap dinámico: lo sirve el backend (incluye blog posts desde DB).
      - type: rewrite
        source: /sitemap.xml
        destination: https://oirconecta-api.onrender.com/sitemap.xml
      # Rutas heredadas del hack SEO en DreamHost: las enviamos al backend
      # para que responda 410 Gone y Google las desindexe.
      - type: rewrite
        source: /items/*
        destination: https://oirconecta-api.onrender.com/gone/items
      - type: rewrite
        source: /shop/*
        destination: https://oirconecta-api.onrender.com/gone/shop
      - type: rewrite
        source: /wp-content/*
        destination: https://oirconecta-api.onrender.com/gone/wp-content
      - type: rewrite
        source: /wp-includes/*
        destination: https://oirconecta-api.onrender.com/gone/wp-includes
      - type: rewrite
        source: /wp-admin/*
        destination: https://oirconecta-api.onrender.com/gone/wp-admin
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      # Assets con hash en el nombre: cache larga e inmutable.
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      # index.html / rutas SPA: nunca cachear, así tras cada deploy el navegador
      # siempre recibe el HTML nuevo apuntando a los chunks actuales (evita
      # "Importing a module script failed"). /assets/* es más específica y gana.
      - path: /*
        name: Cache-Control
        value: no-cache, must-revalidate
